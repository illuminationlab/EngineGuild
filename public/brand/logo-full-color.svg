<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <rect width="500" height="150" fill="#ffffff"/>
  <!-- Badge circle -->
  <circle cx="68" cy="75" r="52" fill="#1A1A1A" stroke="#BFBFC4" stroke-width="1.5"/>
  <circle cx="68" cy="75" r="44" fill="none" stroke="#BFBFC4" stroke-width="0.5" opacity="0.3"/>
  <!-- Main shaft -->
  <line x1="26" y1="75" x2="110" y2="75" stroke="#BFBFC4" stroke-width="3" stroke-linecap="round"/>
  <!-- Left main journal -->
  <circle cx="34" cy="75" r="7" fill="#1A1A1A" stroke="#BFBFC4" stroke-width="2"/>
  <circle cx="34" cy="75" r="2.5" fill="#BFBFC4"/>
  <!-- Right main journal -->
  <circle cx="102" cy="75" r="7" fill="#1A1A1A" stroke="#BFBFC4" stroke-width="2"/>
  <circle cx="102" cy="75" r="2.5" fill="#BFBFC4"/>
  <!-- Left crank arm -->
  <line x1="50" y1="75" x2="50" y2="46" stroke="#BFBFC4" stroke-width="3" stroke-linecap="round"/>
  <!-- Crankpin bar (red) -->
  <line x1="50" y1="46" x2="86" y2="46" stroke="#C8102E" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right crank arm -->
  <line x1="86" y1="75" x2="86" y2="46" stroke="#BFBFC4" stroke-width="3" stroke-linecap="round"/>
  <!-- Crankpin journal -->
  <circle cx="68" cy="46" r="9" fill="#1A1A1A" stroke="#C8102E" stroke-width="2.5"/>
  <circle cx="68" cy="46" r="3.5" fill="#C8102E"/>
  <!-- Counterweight arc -->
  <path d="M46 75 Q46 108 68 108 Q90 108 90 75" fill="#BFBFC4" opacity="0.18" stroke="#BFBFC4" stroke-width="1"/>
  <!-- ENGINE wordmark -->
  <text x="138" y="61" font-family="Rajdhani, Arial, sans-serif" font-size="48" font-weight="700" fill="#1A1A1A" letter-spacing="1">ENGINE</text>
  <!-- Divider rule -->
  <line x1="138" y1="69" x2="478" y2="69" stroke="#C8102E" stroke-width="1.2"/>
  <!-- GUILD wordmark -->
  <text x="138" y="105" font-family="Rajdhani, Arial, sans-serif" font-size="48" font-weight="600" fill="#C8102E" letter-spacing="6">GUILD</text>
  <!-- Tagline -->
  <text x="138" y="124" font-family="monospace" font-size="8" fill="#aaaaaa" letter-spacing="3">SMALL ENGINE REPAIR</text>
</svg>
